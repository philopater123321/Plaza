<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plazza Pizza rehoboth</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <header class="slide-in">
        <img src="header.png" alt="Plazza Pizza">
    </header>
    <div class="video-container slide-in">

        </video>
    </div>
    <img src="call.png" style="width: 100%; height: 380px;">
    <div class="video2">
        <video width="1800" controls autoplay muted playsinline>
            <source src="video2.mp4" type="video/mp4">
            Your browser doesn't suppor the video tag
        </video>
        <img src="baked.png">
    </div>
    <br><br>
    <div class="menu">
        <h1> Our Menu: </h1>
        <br><br>
        <img class="menu1" src="menu1.png" alt="menu 1">
        <br><br>
        <img class="menu2" src="menu2.png" alt="menu 2">
        <br><br>
    </div>
    

    <script src="script.js"></script>

</html>
