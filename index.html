<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plazza Pizza rehoboth</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon.png">
</head>
<body>
    <header class="slide-in">
        <img src="header.png" alt="Plazza Pizza">
    </header>
    <br>
    <div class="video-container slide-in">
        <video width="1800" controls autoplay muted playsinline>
            <source src="video1.mp4" type="video/mp4">
            Your browser doesn't support the video tag
        </video>
    </div>
    <img src="call.png" style="width: 100%; height: 380px;">
    <div class="video2">
        <video width="1800" controls autoplay muted playsinline>
            <source src="video2.mp4" type="video/mp4">
            Your browser doesn't suppor the video tag
        </video>
        <img src="baked.png">
    </div>
    <br><br>
    <div class="menu">
        <h1> Our Menu: </h1>
        <br><br>
        <img class="menu1" src="menu1.png" alt="menu 1">
        <br><br>
        <img class="menu2" src="menu2.png" alt="menu 2">
        <br><br>
    </div>
    <h1 class="order-online">Order online now!</h1>

    <div id="cart-floating-btn" onclick="toggleCart()">
        🛒 Cart (<span id='cart-badge-count'>0</span>)
    </div>

    <div id="cart-sidebar">
        <div class="cart-sidebar-header">
            <h2 style="font-size: 50px; text-align: center;">Your Order</h2>
            <button class="close-sidebar-btn" onclick="toggleCart()">X</button>
        </div><ul id="cart-items"></ul>
        <div class="cart-sidebar-footer">
            <h3 style="font-size: 40px;">Total: $<span id='cart-total'>0.00</span></h3>
            <button id="checkout-btn">Checkout now!</button>
        </div>
    </div>
    <div id="menu-container">
    </div> 

    <script src="script.js"></script>
</body>
</html>
